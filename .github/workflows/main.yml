name: Generate Pacman Graph

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate pacman graph
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: brayangzz
          outputs: |
            dist/pacman-contribution-graph.svg?type=pacman
            dist/pacman-contribution-graph-dark.svg?type=pacman&palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
