name: Generate Pacman Graph

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate pacman graph
        uses: hugoalh/generate-github-profile-contribution-pacman@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-username: brayangzz
          output-path-light: dist/pacman-contribution-graph.svg
          output-path-dark: dist/pacman-contribution-graph-dark.svg

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
